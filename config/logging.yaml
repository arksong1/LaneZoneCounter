version: 1

formatters:
  simple:
    format: '[%(asctime)s] %(levelname)s - %(name)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: logs/application.log

# Logic chính
loggers: 
  detector:
    level: INFO
    handlers: [console, file]
    propagate: no
  
  counter:
    level: INFO
    handlers: [console, file]
    propagate: no

  saver:
    level: INFO
    handlers: [console, file]
    propagate: no

  visualize:
    level: INFO
    handlers: [console, file]
    propagate: no

root:
  level: INFO
  handlers: [console, file]