app:
  name: Object Detection and Tracking
  version: 1.0.0
  env: production

data:
  source: inputs/videos
  output: outputs
  model: models

input:
  path: inputs/videos/videoplayback.mp4
  vid_stride: 1 
  display: true
  
detector:
  type: yolo26n
  conf_threshold: 0.5
  iou_threshold: 0.7
  classes: null  
  max_det: 100
  device: null  # null cho auto

counters:
#   - type: line
#     start: [100, 200]
#     end: [500, 200]
#     color: [255, 0, 0]  # BGR: Blue
  
  # - type: zone
  #   top_left: [100, 100]
  #   bottom_right: [500, 300]
  #   color: [0, 255, 0]  # BGR: Green
  
  # # Lane với nhiều vùng
  - type: lanezone
    points:
       - [[220, 50], [255, 50], [190, 300], [60, 300]]
       - [[255, 50], [295, 50], [315, 300], [190, 300]]
       - [[295, 50], [325, 50], [445, 300], [315, 300]]
       - [[325, 50], [360, 50], [570, 300], [445, 300]]
      #  - [[170, 100], [400, 100], [550, 300], [50, 300]]

    color:
      - [255, 0, 0]
      - [0, 255, 0]
      - [0, 0, 255]
      - [255, 255, 0]
  
  # LaneZone với NHIỀU VÙNG (3 làn đường riêng biệt)
  # - type: lanezone
  #   points: [
  #     # Zone 1 - Làn trên
  #     [[770, 280], [870, 280], [870, 0], [770, 0]], # Tối đa 80km/h
  #     [[870, 280], [970, 280], [970, 0], [870, 0]], # Tối đa 60km/h
  #     [[1020, 280], [1120, 280], [1120, 0], [1020, 0]],  # Tối đa 60km/h
  #     [[1120, 280], [1220, 280], [1220, 0], [1120, 0]],  # Tối đa 40km/h

  #     # Zone 2 - Làn dưới
  #     [[770, 1080], [870, 1080], [870, 830], [770, 830]], # Tối đa 80km/h
  #     [[870, 1080], [970, 1080], [970, 830], [870, 830]], # Tối đa 60km/h
  #     [[1020, 1080], [1120, 1080], [1120, 830], [1020, 830]], # Tối đa 60km/h
  #     [[1120, 1080], [1220, 1080], [1220, 830], [1120, 830]], # Tối đa 40km/h

  #     # Zone 3 - Làn trái
  #     [[0, 420], [620, 420], [620, 570], [0, 570]], # Tối đa 60km/h
  #     [[0, 570], [620, 570], [620, 680], [0, 680]], # Tối đa 60km/h

  #     # Zone 4 - Làn phải
  #     [[1340, 480], [1980, 480], [1980, 570], [1340, 570]],  # Tối đa 30km/h
  #   ]
  #   colors: [  # Màu riêng cho từng zone (11 zones = 11 màu)
  #     [255, 0, 0],      # Zone 1: Blue
  #     [0, 255, 0],      # Zone 2: Green  
  #     [0, 0, 255],      # Zone 3: Red
  #     [255, 255, 0],    # Zone 4: Cyan
  #     [255, 0, 255],    # Zone 5: Magenta
  #     [0, 255, 255],    # Zone 6: Yellow
  #     [128, 0, 128],    # Zone 7: Purple
  #     [255, 128, 0],    # Zone 8: Orange
  #     [128, 128, 0],    # Zone 9: Olive
  #     [0, 128, 128],    # Zone 10: Teal
  #     [128, 128, 128]   # Zone 11: Gray
  #   ]
  #   max_speeds: [  # Tốc độ tối đa cho từng zone (km/h)
  #     80,  # Zone 1 - Làn trên zone 1
  #     60,  # Zone 2 - Làn trên zone 2
  #     60,  # Zone 3 - Làn trên zone 3
  #     40,  # Zone 4 - Làn trên zone 4
  #     80,  # Zone 5 - Làn dưới zone 1
  #     60,  # Zone 6 - Làn dưới zone 2
  #     60,  # Zone 7 - Làn dưới zone 3
  #     40,  # Zone 8 - Làn dưới zone 4
  #     60,  # Zone 9 - Làn trái zone 1
  #     60,  # Zone 10 - Làn trái zone 2
  #     10   # Zone 11 - Làn phải
  #   ]

saver:
  save_images: false
  save_videos: false
  save_detections: false
  save_crops: false

tracker:
  type: bytetrack  # bytetrack or strongsort
  max_age: 30
  n_init: 3
  iou_threshold: 0.3

visualizer:
  show_detections: true
  show_tracks: true
  show_count: true

speed:
  enabled: true  # Bật/tắt tính toán vận tốc
  fps: 30  # Frame per second của video (30 cho video thông thường)
  
  # pixel_per_meter: Số pixel tương ứng 1 mét trong video
  # Cách calibrate:
  #   1. Đo một đoạn đường thực tế (ví dụ: 10 meters)
  #   2. Đếm số pixels tương ứng trong video (ví dụ: 217 pixels)
  #   3. pixel_per_meter = 217 / 10 = 21.7
  # 
  # Với video drone từ trên cao:
  #   - Chiều cao drone: 50m
  #   - Video resolution: 1920x1080
  #   - FOV (field of view): ~100m
  #   - => ~100m / 1920px = ~0.052 m/pixel => ~19.2 pixel/meter
  pixel_per_meter: 21.7
  
  # smooth_window: Số frame để smooth speed (giảm nhiễu)
  # Giá trị nhỏ (3-5): Responsive nhưng nhiễu
  # Giá trị lớn (10-15): Mượt nhưng chậm phản ứng
  smooth_window: 5